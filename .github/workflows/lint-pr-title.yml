name: Lint PR Title

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            ci
            build
            chore
          requireScope: false
          subjectPattern: ^[a-z](?:.*[^.])?$
          subjectPatternError: |
            PR title subject must start with a lowercase letter and not end with a period.
            Release-please parses squash-merge subjects; non-conventional titles silently skip releases.
            Allowed types: feat, fix, perf, refactor, docs, test, ci, build, chore.
            Example: "fix: handle empty payload from controlWorkMode"
