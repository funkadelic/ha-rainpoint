# SonarQube project configuration for RainPoint Cloud Integration

# Project identification
sonar.projectKey=funkadelic_ha-rainpoint
sonar.organization=funkadelic

# Project metadata
sonar.projectName=RainPoint Cloud Integration
sonar.projectVersion=1.4.0 # x-release-please-version

# Source code location
sonar.sources=custom_components/rainpoint
sonar.tests=tests
sonar.test.inclusions=tests/**/*

# Exclude test files from duplication detection
sonar.cpd.exclusions=tests/**/*

# Python version for analysis
# pytest-homeassistant-custom-component 0.13.310+ requires Python 3.13+
sonar.python.version=3.13

# Coverage reports
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
